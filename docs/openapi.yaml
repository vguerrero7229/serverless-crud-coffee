openapi: 3.0.3
info:
  title: Victor Guerrero - Coffee Shop Menu API
  description: |
    REST API for the coffee shop menu (CRUD). **API Gateway → Lambda → DynamoDB** (no direct API Gateway → DynamoDB proxy).

    Allowed categories: `espresso`, `brew`, `tea`, `pastry`, `seasonal`, `other`.

    After deploy: open **`GET /docs`** on your API for Swagger UI. You can also use [Swagger Editor](https://editor.swagger.io/) or Postman (**Import → File**).
  version: 1.0.0

servers:
  # Update this URL after each deploy (see serverless deploy output → endpoints)
  - url: https://9apo3qhmvh.execute-api.us-east-1.amazonaws.com/dev
    description: dev stage (example)

tags:
  - name: Menu items
    description: Menu CRUD operations

paths:
  /menu/items:
    post:
      tags: [Menu items]
      summary: Create menu item
      operationId: createMenuItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemRequest"
            example:
              name: Oat Flat White
              priceCents: 495
              category: espresso
              description: Double ristretto, oat milk
              available: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMenuItemResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

    get:
      tags: [Menu items]
      summary: List menu items
      operationId: listMenuItems
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [espresso, brew, tea, pastry, seasonal, other]
      responses:
        "200":
          description: List sorted by name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMenuItemsResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /menu/items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Menu item UUID

    get:
      tags: [Menu items]
      summary: Get menu item by id
      operationId: getMenuItem
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMenuItemResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

    put:
      tags: [Menu items]
      summary: Update menu item (partial)
      operationId: updateMenuItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMenuItemRequest"
            example:
              priceCents: 525
              available: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMenuItemResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

    delete:
      tags: [Menu items]
      summary: Delete menu item
      operationId: deleteMenuItem
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  id:
                    type: string
                    format: uuid
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

components:
  schemas:
    MenuItem:
      type: object
      required: [id, name, description, priceCents, category, available, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        priceCents:
          type: integer
          minimum: 1
        category:
          type: string
          enum: [espresso, brew, tea, pastry, seasonal, other]
        available:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateMenuItemRequest:
      type: object
      required: [name, priceCents, category]
      properties:
        name:
          type: string
        description:
          type: string
        priceCents:
          type: integer
          minimum: 1
        category:
          type: string
          enum: [espresso, brew, tea, pastry, seasonal, other]
        available:
          type: boolean
          default: true

    UpdateMenuItemRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        description:
          type: string
        priceCents:
          type: integer
          minimum: 1
        category:
          type: string
          enum: [espresso, brew, tea, pastry, seasonal, other]
        available:
          type: boolean

    CreateMenuItemResponse:
      type: object
      properties:
        item:
          $ref: "#/components/schemas/MenuItem"

    ListMenuItemsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"
        count:
          type: integer

    GetMenuItemResponse:
      type: object
      properties:
        item:
          $ref: "#/components/schemas/MenuItem"

    UpdateMenuItemResponse:
      type: object
      properties:
        item:
          $ref: "#/components/schemas/MenuItem"

    ErrorMessage:
      type: object
      properties:
        message:
          type: string
