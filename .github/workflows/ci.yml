name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Resolve Serverless config (no AWS deploy)
        run: npx serverless print --stage dev
