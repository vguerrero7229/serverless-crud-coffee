name: aws
runtime: nodejs20.x
memorySize: 256
timeout: 29
stage: ${opt:stage, 'dev'}
region: ${opt:region, 'us-east-1'}
stackName: coffee-shop-${sls:stage}
apiGateway:
  minimumCompressionSize: 1024
environment:
  TABLE_NAME: ${self:custom.tableName}
  STAGE: ${sls:stage}
iam:
  role:
    statements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:DeleteItem
          - dynamodb:Scan
        Resource:
          - Fn::Join:
              - ''
              - - 'arn:aws:dynamodb:'
                - Ref: AWS::Region
                - ':'
                - Ref: AWS::AccountId
                - ':table/'
                - ${self:custom.tableName}
